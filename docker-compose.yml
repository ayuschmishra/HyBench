services:
  postgres:
    # Pinned to exact digest for reproducibility (multi-arch manifest-list digest,
    # resolves on both amd64 and arm64). Corresponds to tag pgvector/pgvector:pg16
    # as pulled on 2026-07-01 (upstream image build date 2026-06-30).
    # To deliberately upgrade, refresh with:
    #   docker pull pgvector/pgvector:pg16
    #   docker inspect pgvector/pgvector:pg16 --format '{{index .RepoDigests 0}}'
    # then replace the digest below and document the change.
    image: pgvector/pgvector@sha256:ad2e18408bf447f62092a8a5259e7df10505c5a0360bd1a1853ac8b8b0763da2
    container_name: hybench_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hybench}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hybench}
      POSTGRES_DB: ${POSTGRES_DB:-hybench}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - hybench_pgdata:/var/lib/postgresql/data
      - ./sql/create_tables.sql:/docker-entrypoint-initdb.d/01_create_tables.sql
    command: >
      postgres
        -c shared_buffers=512MB
        -c effective_cache_size=1536MB
        -c maintenance_work_mem=256MB
        -c max_parallel_workers_per_gather=2
        -c work_mem=64MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hybench}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  hybench_pgdata:
